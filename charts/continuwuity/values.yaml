## @section Global
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

## @section Common
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}

## @section Image
image:
  registry: forgejo.ellis.link
  repository: continuwuation/continuwuity
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1

## @section Homeserver configuration
## Maps to CONTINUWUITY_* environment variables.
config:
  serverName: localhost
  ## Open registration is dev-only. When true and no registrationToken is set,
  ## the "prone to abuse" open-registration flag is enabled automatically.
  allowRegistration: false
  registrationToken: ""
  allowFederation: false
  allowCheckForUpdates: false
  maxRequestSize: "20000000"
  trustedServers: "[]"
## Extra env vars appended verbatim (list of {name,value} maps).
extraEnvVars: []

## @section Persistence
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 8Gi
  annotations: {}
  ## Mount path — matches CONTINUWUITY_DATABASE_PATH.
  mountPath: /var/lib/continuwuity

## @section Service
service:
  type: ClusterIP
  port: 8008
  nodePort: ""
  annotations: {}

## @section Ingress
ingress:
  enabled: false
  ingressClassName: ""
  hostname: continuwuity.local
  path: /
  pathType: ImplementationSpecific
  annotations: {}
  tls: false
  ## Defaults to "<hostname-with-dashes>-tls" when tls is enabled and this is empty.
  tlsSecret: ""

## @section Networking
containerPorts:
  http: 8008

## @section Probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

## @section Security & scheduling
podSecurityContext:
  enabled: true
  fsGroup: 1000
containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources: {}
podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
