## @section Global
global:
  imageRegistry: ""
  imagePullSecrets: []

## @section Common
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}

## @section Image
image:
  registry: ghcr.io
  repository: element-hq/element-web
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 1

## @section Element configuration
## Rendered into /app/config.json.
config:
  homeserverBaseUrl: http://continuwuity:8008
  homeserverName: localhost
  brand: Element
  defaultTheme: dark
  disableGuests: true
  disableCustomUrls: false
  roomDirectoryServers:
    - localhost

## @section Networking
containerPorts:
  http: 80
service:
  type: ClusterIP
  port: 80
  nodePort: ""
  annotations: {}

## @section Ingress
ingress:
  enabled: false
  ingressClassName: ""
  hostname: element.local
  path: /
  pathType: ImplementationSpecific
  annotations: {}
  tls: false
  tlsSecret: ""

## @section Probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

## @section Security & scheduling
## Disabled by default: the upstream nginx image binds :80 and is not hardened
## for non-root. Enable and adjust if your image supports it.
podSecurityContext:
  enabled: false
  fsGroup: 1000
containerSecurityContext:
  enabled: false
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources: {}
podLabels: {}
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
