name: matrix-stack

services:
  continuwuity:
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    container_name: continuwuity
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - continuwuity_data:/var/lib/continuwuity
    environment:
      CONTINUWUITY_SERVER_NAME: "localhost"
      CONTINUWUITY_DATABASE_PATH: "/var/lib/continuwuity"
      CONTINUWUITY_PORT: "8008"
      CONTINUWUITY_ADDRESS: "0.0.0.0"
      CONTINUWUITY_MAX_REQUEST_SIZE: "20000000"
      CONTINUWUITY_ALLOW_REGISTRATION: "true"
      # Pas de token requis pour l'enregistrement (dev/local uniquement).
      CONTINUWUITY_YES_I_AM_VERY_VERY_SURE_I_WANT_AN_OPEN_REGISTRATION_SERVER_PRONE_TO_ABUSE: "true"
      CONTINUWUITY_ALLOW_FEDERATION: "false"
      CONTINUWUITY_ALLOW_CHECK_FOR_UPDATES: "false"
      CONTINUWUITY_TRUSTED_SERVERS: "[]"

  element:
    image: ghcr.io/element-hq/element-web:latest
    container_name: element-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./element-config.json:/app/config.json:ro
    depends_on:
      continuwuity:
        condition: service_started

volumes:
  continuwuity_data:
